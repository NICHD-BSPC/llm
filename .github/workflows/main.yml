name: Build and test containers

env:
  APPTAINER_VERSION: "1.3.6"
  REGISTRY: ghcr.io
  PODMAN_IMAGE_NAME: localhost/llm-devcontainer:latest
  SINGULARITY_SIF_PATH: llm.sif

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  podman-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      # Pyhon required for running the launch and build scripts
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Build container image
        run: python3 build.py build

      - name: Run shell diagnostics
        run: |
          set -o pipefail
          log_file="$(mktemp)"
          mkdir -p "$HOME/.codex" "$HOME/.claude" "$HOME/.aws/sso/cache"
          touch "$HOME/.codex/auth.json" "$HOME/.claude/settings.json" "$HOME/.claude.json" "$HOME/.aws/config"

          echo "HOME=$HOME"
          id
          ls -ld "$HOME/.codex" "$HOME/.claude" "$HOME/.aws" || true
          ls -l "$HOME/.claude.json" || true
          python3 launch.py --verbose --dry-run --backend podman --image-name "${PODMAN_IMAGE_NAME}" shell tests/container-diagnostics.sh 2>&1 | tee -a "$log_file"
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            exit "$status"
          fi

          # the launch script uses `-it` when running the container, but this
          # test is not running in a TTY. So we fake it with `script`.
          script -q -e -c "bash tests/run-diagnostics.sh --image-name ${PODMAN_IMAGE_NAME} shell podman" /dev/null 2>&1 | tee -a "$log_file"
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            exit "$status"
          fi

          if grep -q '✗' "$log_file"; then
            echo "Diagnostics output contained a failure marker (✗)." >&2
            exit 1
          fi

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login "${{ env.REGISTRY }}" -u "${{ github.actor }}" --password-stdin

      - name: Push Podman image to GitHub Container Registry
        if: github.event_name != 'pull_request'
        run: |
          repo_lc="$(printf '%s' "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          image_base="${{ env.REGISTRY }}/${repo_lc}"
          sha_tag="sha-${GITHUB_SHA}"

          podman tag localhost/llm-devcontainer:latest "${image_base}:${sha_tag}"
          podman push "${image_base}:${sha_tag}"

          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            podman tag localhost/llm-devcontainer:latest "${image_base}:latest"
            podman push "${image_base}:latest"
          fi

  singularity-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl podman rsync openssh-server

          curl -fsSL \
            -o /tmp/apptainer.deb \
            "https://github.com/apptainer/apptainer/releases/download/v${APPTAINER_VERSION}/apptainer_${APPTAINER_VERSION}_amd64.deb"
          sudo apt-get install -y /tmp/apptainer.deb
          sudo ln -sf "$(command -v apptainer)" /usr/local/bin/singularity

      - name: Verify Apptainer install
        run: |
          apptainer --version
          singularity --version

      - name: Build Singularity image through localhost publish flow
        run: |
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          ssh-keygen -t ed25519 -f "$HOME/.ssh/id_ed25519" -N ""
          cat "$HOME/.ssh/id_ed25519.pub" >> "$HOME/.ssh/authorized_keys"
          chmod 600 "$HOME/.ssh/authorized_keys"
          ssh-keyscan -H localhost >> "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/known_hosts"

          eval "$(ssh-agent -s)"
          ssh-add "$HOME/.ssh/id_ed25519"

          sudo mkdir -p /run/sshd
          sudo /usr/sbin/sshd

          python3 build.py publish \
            --remote-path /tmp/llm-ci \
            --force \
            localhost

      - name: Verify Singularity artifact exists
        run: ssh localhost test -f /tmp/llm-ci/llm.sif

      - name: Run shell diagnostics
        run: |
          set -o pipefail
          log_file="$(mktemp)"
          mkdir -p "$HOME/.codex" "$HOME/.claude" "$HOME/.aws/sso/cache"
          touch "$HOME/.codex/auth.json" "$HOME/.claude/settings.json" "$HOME/.claude.json" "$HOME/.aws/config"
          cp /tmp/llm-ci/llm.sif .
          script -q -e -c "bash tests/run-diagnostics.sh --sif-path ${SINGULARITY_SIF_PATH} shell singularity" /dev/null 2>&1 | tee -a "$log_file"
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            exit "$status"
          fi

          if grep -q '✗' "$log_file"; then
            echo "Diagnostics output contained a failure marker (✗)." >&2
            exit 1
          fi

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | apptainer registry login --username "${{ github.actor }}" --password-stdin "docker://${{ env.REGISTRY }}"

      - name: Push Singularity SIF to GitHub Container Registry
        if: github.event_name != 'pull_request'
        run: |
          repo_lc="$(printf '%s' "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          image_base="oras://${{ env.REGISTRY }}/${repo_lc}-sif"
          sha_tag="sha-${GITHUB_SHA}"

          apptainer push --allow-unsigned ./llm.sif "${image_base}:${sha_tag}"

          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            apptainer push --allow-unsigned ./llm.sif "${image_base}:latest"
          fi
