name: Build and test containers

env:
  APPTAINER_VERSION: "1.3.6"

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  diagnostics:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Build container image
        run: python3 build.py build

      - name: Run shell diagnostics
        run: |
          set -o pipefail
          log_file="$(mktemp)"
          mkdir -p "$HOME/.codex" "$HOME/.claude" "$HOME/.aws/sso/cache"
          touch "$HOME/.codex/auth.json" "$HOME/.claude/settings.json" "$HOME/.claude.json" "$HOME/.aws/config"

          echo "HOME=$HOME"
          id
          ls -ld "$HOME/.codex" "$HOME/.claude" "$HOME/.aws" || true
          ls -l "$HOME/.claude.json" || true
          python3 launch.py --verbose --dry-run --backend podman shell tests/container-diagnostics.sh 2>&1 | tee -a "$log_file"
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            exit "$status"
          fi

          # the launch script uses -it when running the container, but this
          # test is not running in a TTY.
          # -q omits start/stop messages; -e return exit code so we fail
          # workflow if needed; -c don't start shell. Taken together (plus
          # logging to /dev/null) means essentially: "run the command in a fake
          # terminal"
          script -q -e -c "bash tests/run-diagnostics.sh shell podman" /dev/null 2>&1 | tee -a "$log_file"
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            exit "$status"
          fi

          if grep -q '✗' "$log_file"; then
            echo "Diagnostics output contained a failure marker (✗)." >&2
            exit 1
          fi

  singularity-build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      # Pyhon required for running the launch and build scripts
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl podman rsync openssh-server

          curl -fsSL \
            -o /tmp/apptainer.deb \
            "https://github.com/apptainer/apptainer/releases/download/v${APPTAINER_VERSION}/apptainer_${APPTAINER_VERSION}_amd64.deb"
          sudo apt-get install -y /tmp/apptainer.deb
          sudo ln -sf "$(command -v apptainer)" /usr/local/bin/singularity

      - name: Verify Apptainer install
        run: |
          apptainer --version
          singularity --version

      - name: Build Singularity image through localhost publish flow
        run: |
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          ssh-keygen -t ed25519 -f "$HOME/.ssh/id_ed25519" -N ""
          cat "$HOME/.ssh/id_ed25519.pub" >> "$HOME/.ssh/authorized_keys"
          chmod 600 "$HOME/.ssh/authorized_keys"
          ssh-keyscan -H localhost >> "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/known_hosts"

          eval "$(ssh-agent -s)"
          ssh-add "$HOME/.ssh/id_ed25519"

          sudo mkdir -p /run/sshd
          sudo /usr/sbin/sshd

          python3 build.py publish \
            --remote-path /tmp/llm-ci \
            --force \
            localhost

      - name: Verify Singularity artifact exists
        run: ssh localhost test -f /tmp/llm-ci/llm.sif


      - name: Run shell diagnostics
        run: |
          set -o pipefail
          log_file="$(mktemp)"
          mkdir -p "$HOME/.codex" "$HOME/.claude" "$HOME/.aws/sso/cache"
          touch "$HOME/.codex/auth.json" "$HOME/.claude/settings.json" "$HOME/.claude.json" "$HOME/.aws/config"
          cp /tmp/llm-ci/llm.sif .
          script -q -e -c "bash tests/run-diagnostics.sh shell singularity" /dev/null 2>&1 | tee -a "$log_file"
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            exit "$status"
          fi

          if grep -q '✗' "$log_file"; then
            echo "Diagnostics output contained a failure marker (✗)." >&2
            exit 1
          fi
